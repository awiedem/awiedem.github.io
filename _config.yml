# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "GERDA"
author: "Hanno Hilbig, Vincent Heddesheimer, Florian Sichart, Andreas Wiedemann"
email: hhilbig@ucdavis.edu
author_emails:
  - vincent.heddesheimer@princeton.edu
  - hhilbig@ucdavis.edu
  - fsichart@princeton.edu
  - awiedemann@princeton.edu
description: >- # this means to ignore newlines until "baseurl:"
  Comprehensive dataset of local, state, federal, European, mayoral, and county election results in Germany, plus subnational public opinion estimates. Facilitating research on electoral behavior, representation, and political responsiveness. Umfassende Datenbank von: Bundestagswahlergebnissen, Landeswahlergebnissen, Kommunalwahlergebnissen, Europawahlergebnissen, Bürgermeisterwahlen und Kreistagswahlen in Deutschland, sowie subnationalen Meinungsschätzungen.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://german-elections.com" # the base hostname & protocol for your site, e.g. http://example.com

# Add these SEO-related fields:
keywords: "German elections, election results, municipal elections, state elections, federal elections, European elections, mayoral elections, county elections, public opinion, MRP, Meinungsbild, Kreistagswahlen, political science data, GERDA, Deutsche Wahlen, Wahlergebnisse, Kommunalwahlen, Landtagswahlen, Bundestagswahlen, Europawahlen, Bürgermeisterwahlen, Politikwissenschaftliche Daten"
language: "en"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap

header_pages:
  - dashboard.md
  - meinungsbild.md
  - election-data.md
  - r-package.md
  - usage_notes.md
  - update-log.md

# SEO: Social card configuration
# Note: twitter config block removed to avoid generating broken @-handle meta tags.
# The card type is set via page defaults below.

# SEO: Default values for all pages
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/map_elec_fed_combined.png

# Exclude from processing.
